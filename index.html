<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sára &amp; James</title>
  <meta name="description" content="Sára &amp; James" />
  <meta name="robots" content="noindex, nofollow" />

  <style>
    /* Geist font (variable — one file covers every weight) */
    @font-face {
      font-family: "Geist";
      src: url("fonts/Geist.woff2") format("woff2");
      font-weight: 100 900;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: "Geist";
      src: url("fonts/Geist-Italic.woff2") format("woff2");
      font-weight: 100 900;
      font-style: italic;
      font-display: swap;
    }

    :root {
      --maroon: #3b0014;     /* deep maroon text */
      --cream:  #fff9e9;     /* page background  */
      --gold:   #ffd15f;     /* accents & button */
      --white:  #ffffff;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background: var(--cream);
      color: var(--maroon);
      font-family: "Geist", -apple-system, Segoe UI, Roboto, sans-serif;
      font-weight: 400;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .wrap {
      max-width: 1024px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ---------- Hero (fills the first screen) ---------- */
    .hero {
      min-height: 100vh;
      min-height: 100svh; /* accounts for mobile browser bars */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: clamp(30px, 4.5vh, 58px); /* equal spacing between heart, text, scroll cue */
      text-align: center;
      padding: 40px 0;

      /* Heart sizing — shared so the caption can match the heart's width.
         Height-driven (63vh) on normal desktops; falls back to width (82vw)
         on narrow/mobile screens. 1.348 = the heart image's width:height. */
      --heart-h: min(63vh, calc(82vw / 1.348));
      --heart-w: calc(var(--heart-h) * 1.348);
    }
    .hero img {
      height: var(--heart-h);
      width: auto;
      display: block;
    }
    .invite {
      text-transform: uppercase;
      letter-spacing: 0.12em;
      line-height: 1.9;
      margin: 0;
      width: var(--heart-w);   /* match the heart's width */
      max-width: 92vw;
      /* font scales so the lines span ~the heart's width on desktop,
         while staying readable (13–28px) on small/large screens */
      font-size: clamp(13px, calc(var(--heart-w) / 40), 26px);
    }

    /* subtle "scroll down" hint, sits just below the caption */
    .scroll-hint {
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--maroon);
      opacity: 0.65;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .scroll-hint .arrow {
      font-size: 18px;
      animation: bob 1.8s ease-in-out infinite;
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0); }
      50%      { transform: translateY(6px); }
    }
    @media (prefers-reduced-motion: reduce) {
      .scroll-hint .arrow { animation: none; }
    }


    /* ---------- Save the date ---------- */
    .save-the-date {
      font-family: "Geist", sans-serif;
      font-weight: 800;
      text-align: center;
      font-size: clamp(34px, 7vw, 64px);
      letter-spacing: 0.02em;
      margin: 0 0 40px;
      padding-top: 40px;
      scroll-margin-top: 24px;
    }

    /* ---------- Details (two columns) ---------- */
    .details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: start;
    }
    .details h3 {
      font-size: 19px;
      font-weight: 700;
      margin: 0 0 6px;
    }
    .details p { margin: 4px 0; }

    .map {
      margin-top: 18px;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 2px 10px rgba(59,0,20,0.12);
    }
    .map iframe {
      width: 100%;
      height: 300px;
      border: 0;
      display: block;
    }

    /* gold-bordered info box */
    .info-box {
      border: 2px solid var(--gold);
      border-radius: 10px;
      padding: 26px 28px;
    }
    .info-box section { margin-bottom: 18px; }
    .info-box section:last-child { margin-bottom: 0; }
    .info-box h4 {
      font-size: 16px;
      font-weight: 700;
      margin: 0 0 4px;
    }
    .info-box p {
      margin: 0;
      font-size: 15px;
    }

    /* ---------- RSVP ---------- */
    .rsvp {
      margin: 72px auto 90px;
      max-width: 640px;
    }
    .rsvp h2 {
      font-family: "Geist", sans-serif;
      font-weight: 800;
      font-size: clamp(26px, 5vw, 36px);
      margin: 0 0 8px;
    }
    .rsvp .intro {
      margin: 0 0 28px;
      font-size: 15px;
      opacity: 0.8;
    }
    [hidden] { display: none !important; }

    .field { margin-bottom: 22px; }
    .field > label,
    .field > .label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    .rsvp input[type="text"],
    .rsvp input[type="email"],
    .rsvp input[type="number"],
    .rsvp select {
      width: 100%;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 15px;
      color: var(--maroon);
      background: var(--white);
      border: 1px solid #e3d9c4;
      border-radius: 6px;
      outline: none;
    }
    .rsvp input:focus,
    .rsvp select:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(255,209,95,0.35);
    }

    /* attendance choice — two selectable cards */
    .choice {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .choice-btn {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 18px 14px;
      border: 1.5px solid #e3d9c4;
      border-radius: 8px;
      background: var(--white);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: border-color .15s, background .15s, box-shadow .15s;
    }
    .choice-btn input { position: absolute; opacity: 0; inset: 0; margin: 0; cursor: pointer; }
    .choice-btn:hover { border-color: var(--gold); }
    .choice-btn.selected,
    .choice-btn:has(input:checked) {
      border-color: var(--gold);
      background: rgba(255,209,95,0.18);
      box-shadow: 0 0 0 3px rgba(255,209,95,0.30);
    }

    /* paired first/last name inputs */
    .name-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .guest-block { margin-bottom: 16px; }
    .guest-block .guest-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 8px;
    }

    /* thank-you state */
    .thank-you {
      text-align: center;
      padding: 32px 22px;
      border: 2px solid var(--gold);
      border-radius: 10px;
      background: rgba(255,209,95,0.12);
    }
    .thank-you h3 {
      font-family: "Geist", sans-serif;
      font-weight: 800;
      font-size: 22px;
      margin: 0 0 8px;
    }
    .thank-you p { margin: 0; font-size: 15px; }

    .btn {
      width: 100%;
      padding: 15px;
      font-family: inherit;
      font-size: 16px;
      font-weight: 700;
      color: var(--maroon);
      background: var(--gold);
      border: 0;
      border-radius: 6px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: filter 0.15s ease;
    }
    .btn:hover { filter: brightness(0.95); }
    .btn:disabled { opacity: 0.6; cursor: default; }

    /* status message after submitting */
    .form-status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 6px;
      font-size: 15px;
      display: none;
    }
    .form-status.show { display: block; }
    .form-status.ok  { background: #eef7ec; color: #1f5132; }
    .form-status.err { background: #fbeaea; color: #8a1f1f; }

    /* ---------- Password gate ---------- */
    .gate-box {
      width: min(92vw, 440px);
      margin: 0 auto;
    }
    .gate-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
    }
    .gate-row {
      display: flex;
      gap: 10px;
    }
    #gate-pw {
      flex: 1;
      min-width: 0;
      padding: 12px 14px;
      font-family: inherit;
      font-size: 15px;
      color: var(--maroon);
      background: var(--white);
      border: 1px solid #e3d9c4;
      border-radius: 6px;
      outline: none;
    }
    #gate-pw:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(255,209,95,0.35);
    }
    .gate-btn {
      width: auto;
      padding: 12px 24px;
      white-space: nowrap;
    }
    .gate-error {
      margin: 14px 0 0;
      font-size: 14px;
      color: #8a1f1f;
    }

    /* ---------- Mobile ---------- */
    @media (max-width: 760px) {
      .details { grid-template-columns: 1fr; gap: 32px; }
      .save-the-date { margin: 28px 0 32px; }
    }
    @media (max-width: 480px) {
      .name-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <!-- PUBLIC LANDING GATE — the only thing visible without the password -->
  <div id="gate" class="wrap">
    <header class="hero">
      <img src="images/heart.png" alt="Sára and James" />
      <form id="gate-form" class="gate-box" autocomplete="off">
        <label class="gate-label" for="gate-pw">Please enter the password from your invitation</label>
        <div class="gate-row">
          <input type="password" id="gate-pw" autocomplete="off" autocapitalize="off"
                 autocorrect="off" spellcheck="false" aria-describedby="gate-error" />
          <button type="submit" class="btn gate-btn">Unlock</button>
        </div>
        <p id="gate-error" class="gate-error" hidden>Hmm, that password isn't right — please check your invitation and try again.</p>
      </form>
    </header>
  </div>

  <!-- PROTECTED SITE — injected here only after the correct password is entered -->
  <main id="app" class="wrap" hidden></main>

    };

    const b64ToBytes = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

    async function decryptSite(pw) {
      try {
        const enc = new TextEncoder();
        const km  = await crypto.subtle.importKey("raw", enc.encode(pw), "PBKDF2", false, ["deriveKey"]);
        const key = await crypto.subtle.deriveKey(
          { name: "PBKDF2", salt: b64ToBytes(CIPHER.salt), iterations: 150000, hash: "SHA-256" },
          km, { name: "AES-GCM", length: 256 }, false, ["decrypt"]);
        const ptBuf = await crypto.subtle.decrypt(
          { name: "AES-GCM", iv: b64ToBytes(CIPHER.iv) }, key, b64ToBytes(CIPHER.ct));
        return new TextDecoder().decode(ptBuf);
      } catch (e) {
        return null; // wrong password → authentication fails
      }
    }

    const gate      = document.getElementById("gate");
    const gateForm  = document.getElementById("gate-form");
    const gatePw    = document.getElementById("gate-pw");
    const gateError = document.getElementById("gate-error");
    const appEl     = document.getElementById("app");

    async function unlock(pw, remember) {
      const html = await decryptSite(pw);
      if (html === null) return false;
      appEl.innerHTML = html;
      appEl.hidden = false;
      gate.hidden = true;
      if (remember) { try { sessionStorage.setItem("wpw", pw); } catch (e) {} }
      window.scrollTo(0, 0);
      initRSVP();
      return true;
    }

    gateForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      gateError.hidden = true;
      const b = gateForm.querySelector("button");
      const t = b.textContent;
      b.disabled = true; b.textContent = "Checking…";
      const ok = await unlock(gatePw.value.trim(), true);
      if (!ok) { gateError.hidden = false; b.disabled = false; b.textContent = t; gatePw.select(); }
    });

    // Stay unlocked while navigating/refreshing during the same browser session.
    (async () => {
      let saved = null;
      try { saved = sessionStorage.getItem("wpw"); } catch (e) {}
      if (saved) { const ok = await unlock(saved, false); if (!ok) { try { sessionStorage.removeItem("wpw"); } catch (e) {} } }
    })();

    /* ==================================================================
       RSVP form logic — runs only AFTER the site is unlocked & injected.
       Each submission becomes one row in the Google Sheet:
         Timestamp | Attending | Party Size | Name(s) | Email
    ================================================================== */
    function initRSVP() {
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwdX1stSLIvR8LFbrQ9UhE7J24Pvbtn2umeHdHtwJ37exCDBl8d8NZ_xADt-0OwzwPL/exec";
    const MAX_GUESTS = 20; // safety guard so a huge number can't freeze the page

    const form         = document.getElementById("rsvp-form");
    const btn          = document.getElementById("submit-btn");
    const statusEl     = document.getElementById("form-status");
    const joiningBox   = document.getElementById("joining-fields");
    const declineBox   = document.getElementById("decline-fields");
    const emailField   = document.getElementById("email-field");
    const partySize    = document.getElementById("partySize");
    const guestNames   = document.getElementById("guest-names");
    const thankYou     = document.getElementById("thank-you");
    const choiceInputs = form.querySelectorAll('input[name="attending"]');

    function showStatus(msg, kind) {
      statusEl.textContent = msg;
      statusEl.className = "form-status show " + kind;
    }
    function clearStatus() { statusEl.className = "form-status"; }

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c =>
        ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
    }

    // Reveal the correct branch when the guest chooses.
    choiceInputs.forEach(input => {
      input.addEventListener("change", () => {
        form.querySelectorAll(".choice-btn").forEach(b =>
          b.classList.toggle("selected", b.querySelector("input").checked));
        const joining = input.value === "yes";
        joiningBox.hidden = !joining;
        declineBox.hidden = joining;
        emailField.hidden = false;
        btn.hidden = false;
        btn.textContent = joining ? "Can't wait — count us in!" : "Send our reply";
        if (joining) renderGuestFields();
        clearStatus();
      });
    });

    // Build N first/last name pairs, preserving anything already typed.
    function renderGuestFields() {
      let n = parseInt(partySize.value, 10);
      if (isNaN(n) || n < 1) { guestNames.innerHTML = ""; return; }
      if (n > MAX_GUESTS) { n = MAX_GUESTS; partySize.value = MAX_GUESTS; }
      const prev = [...guestNames.querySelectorAll("input")].map(i => i.value);
      let html = "";
      for (let i = 0; i < n; i++) {
        const label = i === 0 ? "Guest 1 (you)" : "Guest " + (i + 1);
        const f = prev[i * 2]     || "";
        const l = prev[i * 2 + 1] || "";
        html +=
          '<div class="guest-block">' +
            '<div class="guest-label">' + label + '</div>' +
            '<div class="name-row">' +
              '<input type="text" class="g-first" placeholder="First name" aria-label="' + label + ' first name" value="' + escapeHtml(f) + '" />' +
              '<input type="text" class="g-last" placeholder="Last name" aria-label="' + label + ' last name" value="' + escapeHtml(l) + '" />' +
            '</div>' +
          '</div>';
      }
      guestNames.innerHTML = html;
    }
    partySize.addEventListener("input", renderGuestFields);

    // Validate + submit
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearStatus();

      const checked = form.querySelector('input[name="attending"]:checked');
      if (!checked) { showStatus("Please let us know if you'll be joining us.", "err"); return; }
      const joining = checked.value === "yes";

      const payload = {};
      const names = [];

      if (joining) {
        const n = parseInt(partySize.value, 10);
        if (isNaN(n) || n < 1) { showStatus("Please enter how many people are attending.", "err"); return; }
        const firsts = [...guestNames.querySelectorAll(".g-first")];
        const lasts  = [...guestNames.querySelectorAll(".g-last")];
        for (let i = 0; i < firsts.length; i++) {
          const f = firsts[i].value.trim(), l = lasts[i].value.trim();
          if (!f || !l) { showStatus("Please enter a first and last name for each guest.", "err"); return; }
          names.push(f + " " + l);
        }
        payload.attending = "Yes";
        payload.partySize = String(n);
      } else {
        const f = document.getElementById("declineFirst").value.trim();
        const l = document.getElementById("declineLast").value.trim();
        if (!f || !l) { showStatus("Please enter your first and last name.", "err"); return; }
        names.push(f + " " + l);
        payload.attending = "No";
        payload.partySize = "0";
      }

      const email = document.getElementById("email").value.trim();
      if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(email)) { showStatus("Please enter a valid email address.", "err"); return; }
      payload.email = email;
      payload.names = names.join("; ");

      if (SCRIPT_URL === "PASTE_YOUR_GOOGLE_SCRIPT_URL_HERE") {
        showStatus("Your RSVP looks great! It just isn't connected to the Google Sheet yet — that's the final setup step.", "err");
        return;
      }

      btn.disabled = true;
      const original = btn.textContent;
      btn.textContent = "Sending…";
      try {
        const fd = new FormData();
        Object.entries(payload).forEach(([k, v]) => fd.append(k, v));
        await fetch(SCRIPT_URL, { method: "POST", body: fd, mode: "no-cors" });

        form.hidden = true;
        const title = document.getElementById("thank-you-title");
        const msg   = document.getElementById("thank-you-msg");
        if (joining) {
          title.textContent = "Yay — we can't wait! 🎉";
          msg.textContent   = "Your RSVP is in. See you on August 22nd!";
        } else {
          title.textContent = "Thank you for letting us know. 💛";
          msg.textContent   = "We'll miss you, but we truly appreciate your reply.";
        }
        thankYou.hidden = false;
        thankYou.scrollIntoView({ behavior: "smooth", block: "center" });
      } catch (err) {
        showStatus("Sorry, something went wrong sending your RSVP. Please try again.", "err");
        btn.disabled = false;
        btn.textContent = original;
      }
    });
    } // end initRSVP()
  </script>
